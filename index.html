<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Планировщик</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Дела">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6c5ce7" id="meta-theme">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
body{background:#e9ebf4;display:flex;flex-direction:column;align-items:center}
body.dark{background:#0e0f1c}
.hero,.filters,.search-wrap,#view,#ai-view{width:100%;max-width:480px}
.hero{border-radius:0 0 26px 26px}
.nav,.ai-input-bar{left:calc(50% - 240px);right:auto;width:480px}
.fab{left:calc(50% + 240px - 68px);right:auto}
@media(max-width:520px){.nav,.ai-input-bar{left:0;width:100%}.fab{left:auto;right:18px}}
:root{--bg:#f4f6fb;--card:#fff;--text:#1a1d2e;--muted:#8b90a8;--line:#e8eaf2;--brand:#6c5ce7;--brand2:#a29bfe;--ok:#00b894;--bad:#e17055;--warn:#fdcb6e;--shadow:0 8px 30px rgba(80,80,150,.12)}
body.dark{--bg:#15172a;--card:#1e2138;--text:#eceeff;--muted:#7a80a8;--line:#2a2e4a;--shadow:0 8px 30px rgba(0,0,0,.35)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;transition:background .3s,color .3s}
.hero{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:22px 16px 20px;border-radius:0 0 26px 26px;box-shadow:var(--shadow)}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hero h1{font-size:1.4rem}
.hero .date{opacity:.9;font-size:.82rem;margin-top:2px}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.hero-btns button{background:rgba(255,255,255,.2);border:none;color:#fff;width:40px;height:40px;border-radius:12px;font-size:1.1rem;cursor:pointer}
.hero-stats{display:flex;gap:10px}
.hstat{flex:1;background:rgba(255,255,255,.16);border-radius:14px;padding:10px;text-align:center;backdrop-filter:blur(4px)}
.hstat b{font-size:1.3rem;display:block}
.hstat small{opacity:.85;font-size:.72rem}
.streak-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);padding:4px 12px;border-radius:20px;font-size:.85rem;font-weight:700;margin-top:8px}
.quote-chip{font-size:.78rem;opacity:.92;margin-top:8px;font-style:italic}
.filters{display:flex;gap:8px;padding:14px 16px 6px;overflow-x:auto}
.filters button{white-space:nowrap;border:1.5px solid var(--line);background:var(--card);color:var(--muted);padding:8px 14px;border-radius:20px;font-size:.85rem;cursor:pointer;font-weight:600}
.filters button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.search-wrap{padding:0 16px 4px}
#search{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 14px;font-size:.9rem;background:var(--card);color:var(--text);outline:none}
.list{padding:8px 16px}
.day-sep{font-size:.78rem;color:var(--muted);font-weight:700;margin:16px 4px 8px;text-transform:uppercase;letter-spacing:.5px}
.task{background:var(--card);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;gap:10px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.task .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.task.done{opacity:.55}
.task.done .t-title{text-decoration:line-through}
.chk{width:24px;height:24px;border:2px solid var(--line);border-radius:8px;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-left:4px}
.chk.on{background:var(--ok);border-color:var(--ok);color:#fff}
.t-body{flex:1;min-width:0}
.t-title{font-weight:600;font-size:.95rem;word-break:break-word}
.t-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
.t-meta span{font-size:.72rem;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:10px}
.t-desc{font-size:.8rem;color:var(--muted);margin-top:6px}
.t-acts{display:flex;flex-direction:column;gap:4px}
.t-acts button{background:none;border:none;font-size:1rem;cursor:pointer;opacity:.6;padding:2px}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.empty div{font-size:3rem;margin-bottom:10px}
.rep-badge{background:var(--brand)!important;color:#fff!important}
.subprog{background:var(--brand)!important;color:#fff!important}
.subtasks{margin-top:8px}
.subtask{display:flex;align-items:center;gap:8px;font-size:.82rem;padding:3px 0}
.subtask .sc{width:18px;height:18px;border:2px solid var(--line);border-radius:6px;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.65rem}
.subtask .sc.on{background:var(--ok);border-color:var(--ok);color:#fff}
.subtask.done span{text-decoration:line-through;opacity:.5}
.subtask .sd{margin-left:auto;cursor:pointer;opacity:.5}
.sub-add{display:flex;gap:6px;margin-top:6px}
.sub-add input{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:8px;background:var(--bg);color:var(--text);font-size:.85rem}
.sub-add button{border:none;background:var(--brand);color:#fff;border-radius:10px;padding:0 14px;cursor:pointer;font-weight:700}
.fab{position:fixed;left:50%;transform:translateX(180px);bottom:88px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;font-size:1.8rem;box-shadow:0 6px 20px rgba(108,92,231,.5);cursor:pointer;z-index:40}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:480px;max-width:100%;background:var(--card);display:flex;border-top:1px solid var(--line);z-index:30;overflow-x:auto}
.nav button{flex:1 0 auto;min-width:60px;border:none;background:none;padding:10px 4px 14px;color:var(--muted);font-size:.68rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap}
.nav button.active{color:var(--brand)}
.nav button i{font-size:1.35rem;font-style:normal}
.modal{position:fixed;inset:0;background:rgba(20,20,40,.5);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal.on{display:flex}
.sheet{background:var(--card);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:20px 18px 30px;max-height:88vh;overflow-y:auto;animation:up .25s}
@keyframes up{from{transform:translateY(100%)}}
.sheet h3{margin-bottom:16px;font-size:1.15rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:600}
.field input,.field textarea,.field select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:.95rem;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
.field textarea{resize:none;min-height:60px}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{flex:1;border:1.5px solid var(--line);background:var(--bg);color:var(--muted);padding:10px;border-radius:12px;cursor:pointer;font-weight:600;font-size:.82rem}
.seg button.on{color:#fff}
.pri-r.on{background:var(--bad);border-color:var(--bad)}
.pri-y.on{background:var(--warn);border-color:var(--warn);color:#7a5c00!important}
.pri-b.on{background:var(--brand);border-color:var(--brand)}
.btn{width:100%;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;padding:14px;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:6px}
.btn.ghost{background:var(--bg);color:var(--muted)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 22px;border-radius:30px;font-size:.85rem;font-weight:600;z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.on{opacity:1;bottom:110px}
.fin-hero{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;margin:14px 16px;border-radius:22px;padding:18px;box-shadow:var(--shadow)}
.fin-monthnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-weight:700}
.fin-monthnav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:1.2rem;cursor:pointer}
.fin-balance{display:flex;gap:10px;margin-bottom:14px}
.fin-bal-item{flex:1;background:rgba(255,255,255,.18);border-radius:14px;padding:10px 12px;text-align:center;backdrop-filter:blur(4px)}
.fin-bal-item small{display:block;opacity:.85;font-size:.72rem;margin-bottom:3px}
.fin-bal-item b{font-size:1.05rem}
.fin-chart{position:relative;display:flex;justify-content:center;padding:6px 0}
.fin-chart .center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.fin-chart .center b{font-size:1.25rem;display:block}
.fin-chart .center small{opacity:.85;font-size:.72rem}
.fin-insight{margin:0 16px 14px;background:var(--card);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);border-left:4px solid var(--brand);font-size:.88rem;line-height:1.5}
.fin-insight b{color:var(--brand)}
.fin-log-h{font-size:.82rem;color:var(--muted);font-weight:700;margin:16px 20px 8px;text-transform:uppercase;letter-spacing:.5px}
.budget-card{background:var(--card);border-radius:16px;padding:14px;margin:0 16px 10px;box-shadow:var(--shadow)}
.budget-card .bh{display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:.9rem;margin-bottom:8px}
.budget-bar{height:10px;background:var(--bg);border-radius:6px;overflow:hidden}
.budget-bar i{display:block;height:100%;border-radius:6px;transition:width .4s}
.budget-sub{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted);margin-top:5px}
.budget-warn{color:var(--bad)!important;font-weight:700}
.limit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.limit-row .ln{flex:1;font-size:.9rem;font-weight:600}
.limit-row input{width:110px;border:1.5px solid var(--line);border-radius:10px;padding:8px;background:var(--bg);color:var(--text);text-align:right}
#ai-chat{padding:16px 14px 140px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:82%;padding:11px 14px;border-radius:16px;font-size:.9rem;line-height:1.4;word-break:break-word;white-space:pre-wrap}
.ai-msg.user{align-self:flex-end;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-bottom-right-radius:5px}
.ai-msg.ai{align-self:flex-start;background:var(--card);box-shadow:var(--shadow);border-bottom-left-radius:5px}
.ai-card{align-self:flex-start;background:var(--card);box-shadow:var(--shadow);border-radius:16px;border-left:4px solid var(--ok);padding:14px;max-width:90%;width:100%}
.ai-card h4{margin-bottom:8px;font-size:.95rem}
.ai-card .row{font-size:.85rem;margin:4px 0;display:flex;justify-content:space-between;gap:8px;align-items:center}
.ai-actions{display:flex;gap:8px;margin-top:10px}
.ai-actions button{flex:1;border:none;border-radius:10px;padding:9px;font-weight:600;font-size:.82rem;cursor:pointer}
.ai-actions .yes{background:var(--ok);color:#fff}
.ai-actions .no{background:var(--bg);color:var(--muted)}
.typing{align-self:flex-start;background:var(--card);box-shadow:var(--shadow);padding:14px 18px;border-radius:16px;border-bottom-left-radius:5px}
.typing span{display:inline-block;width:8px;height:8px;background:var(--muted);border-radius:50%;margin:0 2px;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.ai-input-bar{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);width:480px;max-width:100%;background:var(--card);border-top:1px solid var(--line);padding:10px 12px;display:flex;gap:8px;align-items:center;z-index:35}
.ai-input-bar input{flex:1;border:1.5px solid var(--line);border-radius:22px;padding:11px 16px;font-size:.9rem;background:var(--bg);color:var(--text);outline:none}
.mic-btn,.send-btn{width:42px;height:42px;border-radius:50%;border:none;font-size:1.1rem;cursor:pointer;flex:0 0 auto}
.mic-btn{background:var(--bg);color:var(--text)}
.mic-btn.rec{background:var(--bad);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{50%{transform:scale(1.1)}}
.send-btn{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
.ai-hint{align-self:center;color:var(--muted);font-size:.78rem;text-align:center;padding:8px 20px;line-height:1.5}
.confetti{position:fixed;width:10px;height:10px;z-index:300;pointer-events:none;border-radius:2px}
.cat-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.cat-item .emo{font-size:1.4rem;flex:0 0 auto}
.cat-item .nm{flex:1;font-weight:600;font-size:.92rem}
.cat-item .locked{font-size:.72rem;color:var(--muted);background:var(--card);padding:2px 8px;border-radius:8px}
.cat-item button{background:none;border:none;font-size:1rem;cursor:pointer;opacity:.65;padding:3px}
.emoji-pick{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.emoji-pick span{font-size:1.4rem;padding:6px;border-radius:10px;cursor:pointer;border:1.5px solid transparent}
.emoji-pick span.sel{border-color:var(--brand);background:var(--bg)}
.color-pick{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.color-pick span{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s}
.color-pick span.sel{border-color:var(--text);transform:scale(1.1)}
.sub-h{font-size:.78rem;color:var(--muted);font-weight:700;margin:14px 2px 8px;text-transform:uppercase;letter-spacing:.5px}
.feat{background:var(--bg);border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.feat h4{font-size:.92rem;margin-bottom:4px;display:flex;gap:8px;align-items:center}
.feat p{font-size:.82rem;color:var(--muted);line-height:1.5}
.feat code{background:var(--card);padding:1px 6px;border-radius:6px;font-size:.8rem;color:var(--brand)}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <div>
      <h1 id="hero-title">Мои дела</h1>
      <div class="date" id="hero-date"></div>
      <div id="streakBox" class="streak-chip" style="display:none"></div>
      <div class="quote-chip" id="quoteChip"></div>
    </div>
    <div class="hero-btns">
      <button onclick="openHelp()" title="Возможности">❓</button>
      <button onclick="openSettings()" title="Настройки">⚙️</button>
      <button onclick="requestNotify()" title="Напоминания">🔔</button>
      <button onclick="toggleTheme()" title="Тема">🌙</button>
    </div>
  </div>
  <div class="hero-stats" id="hero-stats"></div>
</div>

<div class="filters" id="filters"></div>

<div class="search-wrap" id="search-wrap">
  <input id="search" placeholder="🔍 Поиск..." oninput="render()">
</div>

<div id="view"></div>

<div id="ai-view" style="display:none">
  <div id="ai-chat"></div>
</div>
<div class="ai-input-bar" id="ai-bar" style="display:none">
  <button class="mic-btn" id="mic" onclick="toggleMic()">🎤</button>
  <input id="ai-input" placeholder="Напиши или надиктуй..." onkeydown="if(event.key==='Enter')aiSend()">
  <button class="send-btn" onclick="aiSend()">➤</button>
</div>

<button class="fab" id="fab">+</button>

<div class="nav" id="nav"></div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="modal-title">Новое дело</h3>
    <div class="field"><label>Что нужно сделать?</label><input id="f-title" placeholder="Например: заменить масло"></div>
    <div class="field"><label>Категория</label><select id="f-module"></select></div>
    <div class="field"><label>Дата</label><input id="f-date" type="date"></div>
    <div class="field"><label>🔁 Повтор</label>
      <select id="f-repeat">
        <option value="">Без повтора</option>
        <option value="daily">Каждый день</option>
        <option value="weekly">Каждую неделю</option>
        <option value="monthly">Каждый месяц</option>
      </select>
    </div>
    <div class="field"><label>Приоритет</label>
      <div class="seg">
        <button type="button" class="pri-r" data-pri="R" onclick="pickPri('R')">🔴 Важно</button>
        <button type="button" class="pri-y on" data-pri="Y" onclick="pickPri('Y')">🟡 Средне</button>
        <button type="button" class="pri-b" data-pri="B" onclick="pickPri('B')">🔵 Потом</button>
      </div>
    </div>
    <div class="field"><label>Заметка</label><textarea id="f-desc" placeholder="Детали..."></textarea></div>
    <div class="field"><label>✅ Подзадачи (чек-лист)</label>
      <div id="sub-list" class="subtasks"></div>
      <div class="sub-add"><input id="sub-input" placeholder="Добавить пункт..." onkeydown="if(event.key==='Enter')addSubtask()"><button onclick="addSubtask()">+</button></div>
    </div>
    <button class="btn" onclick="saveTask()">Сохранить</button>
    <button class="btn ghost" onclick="closeModal()">Отмена</button>
  </div>
</div>

<div class="modal" id="modal-exp">
  <div class="sheet">
    <h3>💰 Добавить</h3>
    <div class="field"><label>Тип</label>
      <div class="seg">
        <button type="button" class="pri-b on" id="type-exp" onclick="pickType('exp')">📉 Расход</button>
        <button type="button" class="pri-b" id="type-inc" onclick="pickType('inc')">📈 Доход</button>
      </div>
    </div>
    <div class="field"><label>Сумма ₽</label><input id="e-amount" type="number" inputmode="decimal" placeholder="0"></div>
    <div class="field" id="e-cat-field"><label>Категория</label><select id="e-cat"></select></div>
    <div class="field" id="e-src-field" style="display:none"><label>Источник</label>
      <select id="e-src"><option>Зарплата</option><option>Аванс</option><option>Премия</option><option>Подработка</option><option>Продажа</option><option>Прочее</option></select>
    </div>
    <div class="field"><label>Дата</label><input id="e-date" type="date"></div>
    <div class="field"><label>Комментарий</label><input id="e-desc" placeholder="Необязательно"></div>
    <button class="btn" onclick="saveExpModal()">Сохранить</button>
    <button class="btn ghost" onclick="closeExpModal()">Отмена</button>
  </div>
</div>

<div class="modal" id="modal-cat">
  <div class="sheet">
    <h3>⚙️ Категории</h3>
    <div class="sub-h">📋 Категории дел</div>
    <div id="cat-list"></div>
    <button class="btn" onclick="openCatEdit()">➕ Новая категория дел</button>
    <div class="sub-h">💰 Категории трат</div>
    <div id="expcat-list"></div>
    <button class="btn" onclick="openExpCatEdit()">➕ Новая категория трат</button>
    <button class="btn ghost" onclick="closeCatModal()">Закрыть</button>
  </div>
</div>

<div class="modal" id="modal-cat-edit">
  <div class="sheet">
    <h3 id="cat-edit-title">Новая категория</h3>
    <div class="field"><label>Название</label><input id="cat-name" placeholder="Например: Спортзал"></div>
    <div class="field"><label>Эмодзи</label>
      <input id="cat-emoji" placeholder="🏋️" maxlength="4" oninput="renderEmojiPick()">
      <div class="emoji-pick" id="emoji-pick"></div>
    </div>
    <button class="btn" onclick="saveCat()">Сохранить</button>
    <button class="btn ghost" onclick="closeCatEdit()">Отмена</button>
  </div>
</div>

<div class="modal" id="modal-expcat-edit">
  <div class="sheet">
    <h3 id="expcat-edit-title">Новая категория трат</h3>
    <div class="field"><label>Название</label><input id="expcat-name" placeholder="Например: Питомцы"></div>
    <div class="field"><label>Эмодзи</label>
      <input id="expcat-emoji" placeholder="🐶" maxlength="4" oninput="renderExpEmojiPick()">
      <div class="emoji-pick" id="expemoji-pick"></div>
    </div>
    <button class="btn" onclick="saveExpCat()">Сохранить</button>
    <button class="btn ghost" onclick="closeExpCatEdit()">Отмена</button>
  </div>
</div>

<div class="modal" id="modal-budget">
  <div class="sheet">
    <h3>🎯 Лимиты по категориям</h3>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:14px">Ставь месячный лимит — покажу прогресс и предупрежу.</p>
    <div id="limit-list"></div>
    <button class="btn" onclick="saveBudgets()">Сохранить</button>
    <button class="btn ghost" onclick="closeBudget()">Отмена</button>
  </div>
</div>

<div class="modal" id="modal-settings">
  <div class="sheet">
    <h3>🎨 Настройки</h3>
    <div class="sub-h">Акцентный цвет</div>
    <div class="color-pick" id="color-pick"></div>
    <div class="sub-h">Тема</div>
    <div class="seg">
      <button type="button" class="pri-b" id="th-auto" onclick="setThemeMode('auto')">🌗 Авто</button>
      <button type="button" class="pri-b" id="th-light" onclick="setThemeMode('light')">☀️ Светлая</button>
      <button type="button" class="pri-b" id="th-dark" onclick="setThemeMode('dark')">🌙 Тёмная</button>
    </div>
    <div class="sub-h">🔑 ИИ-ключ Groq</div>
    <button class="btn ghost" onclick="resetApiKey()">🔄 Сменить ключ Groq</button>
    <div class="sub-h">Данные</div>
    <button class="btn" onclick="exportData()">📥 Скачать резервную копию</button>
    <button class="btn ghost" onclick="document.getElementById('import-file').click()">📤 Загрузить копию</button>
    <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(event)">
    <button class="btn ghost" onclick="closeSettings()" style="margin-top:16px">Закрыть</button>
  </div>
</div>

<div class="modal" id="modal-help">
  <div class="sheet">
    <h3>✨ Что умеет приложение</h3>
    <div id="help-body"></div>
    <button class="btn ghost" onclick="closeHelp()">Понятно 👍</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL='https://api.groq.com/openai/v1/chat/completions';
const MODEL='llama-3.3-70b-versatile';
const AI_KEY_STORE='groq_api_key';
function getApiKey(){return localStorage.getItem(AI_KEY_STORE)||'';}
function ensureApiKey(){
  let k=getApiKey();
  if(!k){
    k=prompt('🔑 Вставь свой Groq API ключ\n(получить бесплатно на console.groq.com/keys):');
    if(k){k=k.trim();localStorage.setItem(AI_KEY_STORE,k);toast('Ключ сохранён 🔑');}
  }
  return k;
}
function resetApiKey(){localStorage.removeItem(AI_KEY_STORE);toast('Ключ удалён. Введи новый в чате ИИ');}

const KEY='planner_data_v2';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d))}
function getTasks(){const d=load();return d.tasks||[]}
function setTasks(t){const d=load();d.tasks=t;save(d)}

const monthNames=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const monthFull=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

const DEFAULT_CATS=[
  {id:'personal',emoji:'📋',name:'Личное'},
  {id:'car',emoji:'🚗',name:'Авто'},
  {id:'farm',emoji:'🌱',name:'Огород'},
  {id:'work',emoji:'💼',name:'Работа'}
];
function getCats(){const d=load();if(!d.cats){d.cats=JSON.parse(JSON.stringify(DEFAULT_CATS));save(d);}return d.cats;}
function setCats(c){const d=load();d.cats=c;save(d);}
function catLabel(id){const c=getCats().find(x=>x.id===id);return c?`${c.emoji} ${c.name}`:'📋 Личное';}
const modLabel=new Proxy({},{get:(_,id)=>catLabel(id)});

const DEFAULT_EXPCATS=[
  {name:'Продукты',i:'🛒',c:'#00b894'},{name:'Топливо',i:'⛽',c:'#e17055'},{name:'Кафе',i:'🍔',c:'#fdcb6e'},
  {name:'Транспорт',i:'🚌',c:'#0984e3'},{name:'Одежда',i:'👕',c:'#e84393'},{name:'Развлечения',i:'🎮',c:'#6c5ce7'},
  {name:'Здоровье',i:'💊',c:'#00cec9'},{name:'Дом',i:'🏠',c:'#fab1a0'},{name:'Дети',i:'👶',c:'#fd79a8'},
  {name:'Авто',i:'🚗',c:'#e17055'},{name:'Огород',i:'🌱',c:'#00b894'},{name:'Прочее',i:'📦',c:'#b2bec3'}
];
function getExpCats(){const d=load();if(!d.expcats){d.expcats=JSON.parse(JSON.stringify(DEFAULT_EXPCATS));save(d);}return d.expcats;}
function setExpCats(c){const d=load();d.expcats=c;save(d);}
const CAT_COLORS=['#00b894','#e17055','#fdcb6e','#0984e3','#e84393','#6c5ce7','#00cec9','#fab1a0','#fd79a8','#a29bfe','#55efc4','#ffeaa7'];
function catStyleOf(name){const c=getExpCats().find(x=>x.name===name);return c||{i:'📦',c:'#b2bec3'};}
const catStyle=new Proxy({},{get:(_,name)=>{if(name==='Прочее')return catStyleOf('Прочее');return catStyleOf(name);}});

const priColor={R:'var(--bad)',Y:'var(--warn)',B:'var(--brand)'};

let currentTab='all',currentPri='Y',editId=null,expType='exp',finDate=new Date();

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDate(k){if(!k)return'';const[y,m,d]=k.split('-').map(Number);if(!y)return k;return d+' '+monthNames[m-1]}
function fmtMoney(n){return Number(n||0).toLocaleString('ru-RU')}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),1800)}

function renderNav(){
  const nav=document.getElementById('nav');
  const cats=getCats();
  let html=`<button data-tab="all" class="${currentTab==='all'?'active':''}" onclick="switchTab('all')"><i>📋</i>Все</button>`;
  cats.forEach(c=>{html+=`<button data-tab="${c.id}" class="${currentTab===c.id?'active':''}" onclick="switchTab('${c.id}')"><i>${c.emoji}</i>${esc(c.name)}</button>`;});
  html+=`<button data-tab="finance" class="${currentTab==='finance'?'active':''}" onclick="switchTab('finance')"><i>💰</i>Финансы</button>`;
  html+=`<button data-tab="ai" class="${currentTab==='ai'?'active':''}" onclick="switchTab('ai')"><i>🤖</i>ИИ</button>`;
  html+=`<button data-tab="cats" onclick="openCatModal()"><i>⚙️</i>Ещё</button>`;
  nav.innerHTML=html;
}

function switchTab(tab){
  currentTab=tab;
  const isAI=tab==='ai',isFin=tab==='finance';
  document.getElementById('ai-view').style.display=isAI?'block':'none';
  document.getElementById('ai-bar').style.display=isAI?'flex':'none';
  document.getElementById('view').style.display=(isAI)?'none':'block';
  document.getElementById('fab').style.display=isAI?'none':'flex';
  document.getElementById('filters').style.display=(isAI||isFin)?'none':'flex';
  document.getElementById('search-wrap').style.display=(isAI||isFin)?'none':'block';
  document.querySelector('.hero-stats').style.display=(isAI||isFin)?'none':'flex';
  let title='Мои дела';
  if(tab==='all')title='Мои дела';
  else if(tab==='finance')title='💰 Финансы';
  else if(tab==='ai')title='🤖 Ассистент';
  else title=catLabel(tab);
  document.getElementById('hero-title').textContent=title;
  document.getElementById('streakBox').style.display=(isAI||isFin)?'none':'inline-flex';
  if(isAI){document.getElementById('fab').style.display='none';if(!document.getElementById('ai-chat').children.length)aiHello();}
  else if(isFin)renderFinance();
  else render();
  renderNav();
}

let filterState='active';
function renderFilters(){
  const f=document.getElementById('filters');
  const opts=[['active','Активные'],['today','Сегодня'],['done','Готово'],['all','Всё']];
  f.innerHTML=opts.map(([k,l])=>`<button class="${filterState===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`).join('');
}
function setFilter(k){filterState=k;renderFilters();render();}

function render(){
  renderFilters();
  const view=document.getElementById('view');
  let tasks=getTasks().slice();
  if(currentTab!=='all')tasks=tasks.filter(t=>t.module===currentTab);
  const q=(document.getElementById('search')?.value||'').toLowerCase().trim();
  if(q)tasks=tasks.filter(x=>(x.title+' '+(x.desc||'')).toLowerCase().includes(q));
  const tk=todayKey();
  if(filterState==='active')tasks=tasks.filter(t=>!t.done);
  else if(filterState==='done')tasks=tasks.filter(t=>t.done);
  else if(filterState==='today')tasks=tasks.filter(t=>t.date===tk&&!t.done);
  renderStats();
  if(!tasks.length){view.innerHTML=`<div class="empty"><div>🎉</div>${q?'Ничего не найдено':'Дел нет — отдыхай!'}</div>`;return;}
  const priOrd={R:0,Y:1,B:2};
  tasks.sort((a,b)=>{const da=a.date||'9999',db=b.date||'9999';if(da!==db)return da<db?-1:1;return (priOrd[a.pri]??1)-(priOrd[b.pri]??1);});
  const groups={};
  tasks.forEach(t=>{const k=t.date||'Без даты';(groups[k]=groups[k]||[]).push(t);});
  let html='<div class="list">';
  Object.keys(groups).forEach(k=>{
    let lbl=k==='Без даты'?'📌 Без даты':fmtDate(k);
    if(k===tk)lbl='📅 Сегодня';
    html+=`<div class="day-sep">${lbl}</div>`;
    groups[k].forEach(t=>{
      const subs=t.subs||[];const sdone=subs.filter(s=>s.done).length;
      html+=`<div class="task ${t.done?'done':''}" data-id="${t.id}">
        <div class="bar" style="background:${priColor[t.pri]||priColor.Y}"></div>
        <div class="chk ${t.done?'on':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
        <div class="t-body">
          <div class="t-title">${esc(t.title)}</div>
          <div class="t-meta"><span>${modLabel[t.module]||'📋 Личное'}</span>${t.date?`<span>📅 ${fmtDate(t.date)}</span>`:''}${t.repeat?`<span class="rep-badge">🔁 ${t.repeat==='daily'?'день':t.repeat==='weekly'?'нед':'мес'}</span>`:''}${subs.length?`<span class="subprog">✅ ${sdone}/${subs.length}</span>`:''}</div>
          ${t.desc?`<div class="t-desc">${esc(t.desc)}</div>`:''}
          ${subs.length?`<div class="subtasks">${subs.map((s,i)=>`<div class="subtask ${s.done?'done':''}"><div class="sc ${s.done?'on':''}" onclick="toggleSubtask(${t.id},${i})">${s.done?'✓':''}</div><span>${esc(s.t)}</span></div>`).join('')}</div>`:''}
        </div>
        <div class="t-acts"><button onclick="editTask(${t.id})">✏️</button><button onclick="delTask(${t.id})">🗑</button></div>
      </div>`;
    });
  });
  html+='</div>';
  view.innerHTML=html;
  attachSwipes();
}

function renderStats(){
  const el=document.getElementById('hero-stats');
  let tasks=getTasks();
  if(currentTab!=='all')tasks=tasks.filter(t=>t.module===currentTab);
  const tk=todayKey();
  const total=tasks.length,done=tasks.filter(t=>t.done).length,today=tasks.filter(t=>t.date===tk&&!t.done).length;
  el.innerHTML=`<div class="hstat"><b>${today}</b><small>Сегодня</small></div><div class="hstat"><b>${total-done}</b><small>Активных</small></div><div class="hstat"><b>${done}</b><small>Готово</small></div>`;
}

function toggleTask(id){
  const t=getTasks();const x=t.find(a=>a.id===id);if(!x)return;
  x.done=!x.done;
  if(x.done&&x.repeat){
    const nd=nextRepeatDate(x.date,x.repeat);
    t.push({id:Date.now()+Math.floor(Math.random()*10000),title:x.title,module:x.module,date:nd,desc:x.desc,pri:x.pri,repeat:x.repeat,subs:(x.subs||[]).map(s=>({t:s.t,done:false})),done:false});
    toast('🔁 Повтор создан на '+fmtDate(nd));
  }
  setTasks(t);
  if(x.done){confetti();if(!x.repeat)toast('Готово! 🎉');updateStreak();}
  render();
}
function delTask(id){if(!confirm('Удалить дело?'))return;setTasks(getTasks().filter(a=>a.id!==id));render();toast('Удалено 🗑');}
function editTask(id){
  const t=getTasks().find(a=>a.id===id);if(!t)return;
  editId=id;fillModuleSelect();editSubs=(t.subs||[]).map(s=>({...s}));
  document.getElementById('modal-title').textContent='Изменить дело';
  document.getElementById('f-title').value=t.title||'';
  document.getElementById('f-module').value=t.module||'personal';
  document.getElementById('f-date').value=t.date||'';
  document.getElementById('f-desc').value=t.desc||'';
  document.getElementById('f-repeat').value=t.repeat||'';
  renderSubList();pickPri(t.pri||'Y');
  document.getElementById('modal').classList.add('on');
}

function fillModuleSelect(){
  document.getElementById('f-module').innerHTML=getCats().map(c=>`<option value="${c.id}">${c.emoji} ${esc(c.name)}</option>`).join('');
}
function openModal(){
  editId=null;fillModuleSelect();editSubs=[];
  document.getElementById('modal-title').textContent='Новое дело';
  document.getElementById('f-title').value='';
  const validCat=getCats().some(c=>c.id===currentTab);
  document.getElementById('f-module').value=validCat?currentTab:'personal';
  document.getElementById('f-date').value=todayKey();
  document.getElementById('f-desc').value='';
  document.getElementById('f-repeat').value='';
  renderSubList();pickPri('Y');
  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function pickPri(p){currentPri=p;document.querySelectorAll('#modal .seg button').forEach(b=>b.classList.toggle('on',b.dataset.pri===p));}
function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('Введи название');return;}
  const obj={title,module:document.getElementById('f-module').value,date:document.getElementById('f-date').value||'',desc:document.getElementById('f-desc').value.trim(),pri:currentPri,repeat:document.getElementById('f-repeat').value||'',subs:editSubs.slice()};
  const t=getTasks();
  if(editId){const x=t.find(a=>a.id===editId);if(x)Object.assign(x,obj);}
  else{obj.id=Date.now()+Math.floor(Math.random()*1000);obj.done=false;t.push(obj);}
  setTasks(t);closeModal();render();toast('Сохранено ✅');
}

let editSubs=[];
function renderSubList(){
  const el=document.getElementById('sub-list');if(!el)return;
  el.innerHTML=editSubs.map((s,i)=>`
    <div class="subtask ${s.done?'done':''}">
      <div class="sc ${s.done?'on':''}" onclick="toggleSubEdit(${i})">${s.done?'✓':''}</div>
      <span>${esc(s.t)}</span>
      <span class="sd" onclick="delSubEdit(${i})">🗑</span>
    </div>`).join('');
}
function addSubtask(){
  const inp=document.getElementById('sub-input');const v=inp.value.trim();if(!v)return;
  editSubs.push({t:v,done:false});inp.value='';renderSubList();
}
function toggleSubEdit(i){editSubs[i].done=!editSubs[i].done;renderSubList();}
function delSubEdit(i){editSubs.splice(i,1);renderSubList();}
function toggleSubtask(taskId,idx){
  const t=getTasks();const x=t.find(a=>a.id===taskId);if(!x||!x.subs)return;
  x.subs[idx].done=!x.subs[idx].done;setTasks(t);render();
}

function nextRepeatDate(dateStr,repeat){
  const d=dateStr?new Date(dateStr):new Date();
  if(repeat==='daily')d.setDate(d.getDate()+1);
  else if(repeat==='weekly')d.setDate(d.getDate()+7);
  else if(repeat==='monthly')d.setMonth(d.getMonth()+1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function attachSwipes(){
  document.querySelectorAll('#view .task[data-id]').forEach(el=>{
    let sx=0,sy=0,cur=0,drag=false;
    el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=false;el.style.transition='';},{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
      if(Math.abs(dx)>Math.abs(dy)+6){drag=true;cur=dx;el.style.transform=`translateX(${dx}px)`;}
    },{passive:true});
    el.addEventListener('touchend',()=>{
      el.style.transition='transform .2s';
      const id=Number(el.dataset.id);
      if(cur<-90){delTask(id);}>
      else if(cur>90){toggleTask(id);}
      else el.style.transform='';
      cur=0;
    });
  });
}

let catEditId=null,pickedEmoji='⭐';
const EMOJI_LIST=['📋','🚗','🌱','💼','🏋️','📚','🏠','🐶','✈️','🎮','🎵','🍔','💊','👕','🛒','⚽','💻','🎨','📷','🔧','❤️','⭐','🔥','🎯','👶','🍼'];

function openCatModal(){renderCatList();renderExpCatList();document.getElementById('modal-cat').classList.add('on');}
function closeCatModal(){document.getElementById('modal-cat').classList.remove('on');}

function renderCatList(){
  const cats=getCats();
  let html=`<div class="cat-item"><span class="emo">📋</span><span class="nm">Все</span><span class="locked">🔒 системная</span></div>`;
  cats.forEach(c=>{
    html+=`<div class="cat-item"><span class="emo">${c.emoji}</span><span class="nm">${esc(c.name)}</span>
      <button onclick="openCatEdit('${c.id}')">✏️</button>
      ${c.id==='personal'?'<span class="locked">базовая</span>':`<button onclick="delCat('${c.id}')">🗑</button>`}</div>`;
  });
  document.getElementById('cat-list').innerHTML=html;
}

function openCatEdit(id){
  catEditId=id||null;
  if(id){const c=getCats().find(x=>x.id===id);document.getElementById('cat-edit-title').textContent='Изменить категорию';document.getElementById('cat-name').value=c.name;document.getElementById('cat-emoji').value=c.emoji;pickedEmoji=c.emoji;}
  else{document.getElementById('cat-edit-title').textContent='Новая категория';document.getElementById('cat-name').value='';document.getElementById('cat-emoji').value='';pickedEmoji='⭐';}
  renderEmojiPick();
  document.getElementById('modal-cat-edit').classList.add('on');
}
function closeCatEdit(){document.getElementById('modal-cat-edit').classList.remove('on');}
function renderEmojiPick(){
  const cur=document.getElementById('cat-emoji').value||pickedEmoji;
  document.getElementById('emoji-pick').innerHTML=EMOJI_LIST.map(e=>`<span class="${e===cur?'sel':''}" onclick="pickEmoji('${e}')">${e}</span>`).join('');
}
function pickEmoji(e){pickedEmoji=e;document.getElementById('cat-emoji').value=e;renderEmojiPick();}
function saveCat(){
  const name=document.getElementById('cat-name').value.trim();
  const emoji=document.getElementById('cat-emoji').value.trim()||pickedEmoji||'⭐';
  if(!name){toast('Введи название');return;}
  const cats=getCats();
  if(catEditId){const c=cats.find(x=>x.id===catEditId);if(c){c.name=name;c.emoji=emoji;}}
  else{cats.push({id:'cat_'+Date.now(),emoji,name});}
  setCats(cats);closeCatEdit();renderCatList();renderNav();render();toast('Сохранено ✅');
}
function delCat(id){
  if(id==='personal'){toast('Базовую нельзя удалить');return;}
  const cats=getCats();const c=cats.find(x=>x.id===id);if(!c)return;
  const tasks=getTasks();const inCat=tasks.filter(t=>t.module===id);
  let msg=`Удалить категорию "${c.name}"?`;if(inCat.length)msg+=`\n\n${inCat.length} дел(а) будут перенесены в "Личное".`;
  if(!confirm(msg))return;
  if(inCat.length){tasks.forEach(t=>{if(t.module===id)t.module='personal';});setTasks(tasks);}
  setCats(cats.filter(x=>x.id!==id));
  if(currentTab===id)currentTab='all';
  renderCatList();renderNav();render();toast('Категория удалена 🗑');
}

let expCatEditName=null,pickedExpEmoji='📦';
const EXP_EMOJI_LIST=['🛒','⛽','🍔','🚌','👕','🎮','💊','🏠','👶','🚗','🌱','📦','🐶','🎓','🎁','💡','📱','✈️','🏋️','☕','🍺','💇','🔧','🎬'];

function renderExpCatList(){
  const cats=getExpCats();
  document.getElementById('expcat-list').innerHTML=cats.map(c=>{
    const locked=c.name==='Прочее';
    return `<div class="cat-item"><span class="emo">${c.i}</span><span class="nm">${esc(c.name)}</span>
      <button onclick="openExpCatEdit('${esc(c.name)}')">✏️</button>
      ${locked?'<span class="locked">базовая</span>':`<button onclick="delExpCat('${esc(c.name)}')">🗑</button>`}</div>`;
  }).join('');
}
function openExpCatEdit(name){
  expCatEditName=name||null;
  if(name){const c=getExpCats().find(x=>x.name===name);document.getElementById('expcat-edit-title').textContent='Изменить категорию трат';document.getElementById('expcat-name').value=c.name;document.getElementById('expcat-emoji').value=c.i;pickedExpEmoji=c.i;}
  else{document.getElementById('expcat-edit-title').textContent='Новая категория трат';document.getElementById('expcat-name').value='';document.getElementById('expcat-emoji').value='';pickedExpEmoji='📦';}
  renderExpEmojiPick();
  document.getElementById('modal-expcat-edit').classList.add('on');
}
function closeExpCatEdit(){document.getElementById('modal-expcat-edit').classList.remove('on');}
function renderExpEmojiPick(){
  const cur=document.getElementById('expcat-emoji').value||pickedExpEmoji;
  document.getElementById('expemoji-pick').innerHTML=EXP_EMOJI_LIST.map(e=>`<span class="${e===cur?'sel':''}" onclick="pickExpEmoji('${e}')">${e}</span>`).join('');
}
function pickExpEmoji(e){pickedExpEmoji=e;document.getElementById('expcat-emoji').value=e;renderExpEmojiPick();}
function saveExpCat(){
  const name=document.getElementById('expcat-name').value.trim();
  const emoji=document.getElementById('expcat-emoji').value.trim()||pickedExpEmoji||'📦';
  if(!name){toast('Введи название');return;}
  const cats=getExpCats();
  if(expCatEditName){const c=cats.find(x=>x.name===expCatEditName);if(c){c.name=name;c.i=emoji;}}

    if(cats.some(x=>x.name===name)){toast('Такая категория уже есть');return;}

function delExpCat(name){

  if(!confirm(`Удалить категорию трат "${name}"?\n\nСтарые траты останутся с этим названием.`))return;
  setExpCats(getExpCats().filter(x=>x.name!==name));

}
function createExpCat(name,emoji){
  const cats=getExpCats();
  if(cats.some(x=>x.name.toLowerCase()===name.toLowerCase()))return false;
  const color=CAT_COLORS[cats.length%CAT_COLORS.length];
  cats.splice(cats.length-1,0,{name,i:emoji||'📦',c:color});
  setExpCats(cats);return true;
}
function createTaskCat(name,emoji){
  const cats=getCats();
  if(cats.some(x=>x.name.toLowerCase()===name.toLowerCase()))return cats.find(x=>x.name.toLowerCase()===name.toLowerCase()).id;
  const id='cat_'+Date.now();
  cats.push({id,emoji:emoji||'⭐',name});
  setCats(cats);
  return id;
}

function renderBudgets(){

  const keys=Object.keys(budgets);

  const spent={};s.byCat.forEach(x=>spent[x.name]=x.sum);
  let html=`<div class="fin-log-h">🎯 Бюджеты</div>`;
  keys.forEach(name=>{
    const limit=budgets[name],used=spent[name]||0;
    const pct=Math.min(100,Math.round(used/limit*100));
    const over=used>limit,near=pct>=80&&!over;
    const st=catStyleOf(name);
    let color=over?'var(--bad)':near?'var(--warn)':'var(--ok)';
    html+=`<div class="budget-card">
      <div class="bh"><span>${st.i} ${esc(name)}</span><span class="${over?'budget-warn':''}">${fmtMoney(used)} / ${fmtMoney(limit)}₽</span></div>
      <div class="budget-bar"><i style="width:${pct}%;background:${color}"></i></div>
      <div class="budget-sub"><span>${pct}%</span><span class="${over?'budget-warn':''}">${over?`⚠️ Превышен на ${fmtMoney(used-limit)}₽`:near?`⚠️ Осталось ${fmtMoney(limit-used)}₽`:`Осталось ${fmtMoney(limit-used)}₽`}</span></div>
    </div>`;
  });
  html+=`<div style="text-align:center;margin:4px 16px 14px"><button class="btn ghost" onclick="openBudget()">⚙️ Изменить лимиты</button></div>`;

function checkBudgetAlert(cat){

  const s=getExpenseStats();
  const used=(s.byCat.find(x=>x.name===cat)||{}).sum||0;
  if(used>b[cat])toast(`⚠️ Лимит «${cat}» превышен!`);
  else if(used>=b[cat]*0.8)toast(`⚠️ 80% лимита «${cat}»`);
}

function finStats(y,m){
  const ym=y+'-'+String(m+1).padStart(2,'0');
  const exp=load().finance||[],inc=load().income||[];
  let total=0,income=0;const cats={};
  exp.forEach(r=>{if(!r.amount||!r.date||!r.date.startsWith(ym))return;total+=r.amount;cats[r.category||'Прочее']=(cats[r.category||'Прочее']||0)+r.amount;});
  inc.forEach(r=>{if(!r.amount||!r.date||!r.date.startsWith(ym))return;income+=r.amount;});
  return{total,income,balance:income-total,byCat:Object.keys(cats).map(k=>({name:k,sum:cats[k]})).sort((a,b)=>b.sum-a.sum)};
}
function getExpenseStats(){const d=new Date();return finStats(d.getFullYear(),d.getMonth());}

function weekInsight(){
  const now=new Date();
  const weekAgo=now.getTime()-7*24*60*60*1000;
  const exp=load().finance||[];
  let weekSum=0,prevSum=0;
  const prevWeekAgo=weekAgo-7*24*60*60*1000;
  exp.forEach(r=>{
    if(!r.amount||!r.date)return;
    const ms=new Date(r.date).getTime();
    if(ms>=weekAgo)weekSum+=r.amount;
    else if(ms>=prevWeekAgo&&ms<weekAgo)prevSum+=r.amount;
  });
  if(!weekSum&&!prevSum)return '💡 Записывай траты — покажу недельную статистику!';
  let diff='';
  if(prevSum>0){
    const p=Math.round((weekSum-prevSum)/prevSum*100);
    if(p>5)diff=` 📈 На <b>${p}%</b> больше, чем прошлую неделю`;
    else if(p<-5)diff=` 📉 На <b>${Math.abs(p)}%</b> меньше — молодец!`;
    else diff=' ➡️ Примерно как обычно';
  }
  return `💸 За 7 дней: <b>${fmtMoney(weekSum)} ₽</b>.${diff}`;
}

function donutSVG(byCat,total){
  const R=70,C=2*Math.PI*R;let off=0;
  if(!total)return `<svg width="180" height="180" viewBox="0 0 180 180"><circle cx="90" cy="90" r="${R}" fill="none" stroke="var(--line)" stroke-width="24"/></svg>`;
  let seg='';
  byCat.forEach(x=>{const frac=x.sum/total,len=frac*C;const col=catStyleOf(x.name).c;seg+=`<circle cx="90" cy="90" r="${R}" fill="none" stroke="${col}" stroke-width="24" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 90 90)"/>`;off+=len;});
  return `<svg width="180" height="180" viewBox="0 0 180 180"><circle cx="90" cy="90" r="${R}" fill="none" stroke="var(--line)" stroke-width="24"/>${seg}</svg>`;
}

Форматы ответа:
1){"type":"tasks","items":[{"module":"ID_КАТЕГОРИИ","title":"...","date":"YYYY-MM-DD","desc":"...","pri":"R|Y|B"}]}
2){"type":"expense","items":[{"amount":300,"category":"Продукты","desc":"йогурт"}],"date":"YYYY-MM-DD"}
3){"type":"income","amount":50000,"source":"Зарплата","desc":"...","date":"YYYY-MM-DD"}
4){"type":"stats"}
5){"type":"chat","message":"..."}
6){"type":"mixed","tasks":[...],"expenses":[...],"incomes":[...]}
7){"type":"new_cat","name":"Спортзал","emoji":"🏋️"}
8){"type":"new_expcat","name":"Питомцы","emoji":"🐶"}
9){"type":"suggest_cat","kind":"exp","name":"Питомцы","emoji":"🐶","pending":{"amount":500,"desc":"корм коту","date":"YYYY-MM-DD"}}

ПРАВИЛА:
- Существующие категории трат: ${expCatsInfo}.
- Существующие категории дел (ID): ${catsInfo}. Используй ID в поле module. Если не подходит — personal.

- Если И дела, И траты → type:"mixed". Остальное (болтовня, вопросы) → type:"chat".`;
  try{

  if(obj.type==='tasks'&&obj.items?.length){
    const t=getTasks();
    const validIds=getCats().map(c=>c.id);
    obj.items.forEach(it=>{const mod=validIds.includes(it.module)?it.module:'personal';t.push({id:Date.now()+Math.floor(Math.random()*10000),title:it.title||'Дело',module:mod,date:it.date||'',desc:it.desc||'',pri:it.pri||'Y',done:false});});
    setTasks(t);
    const c=document.createElement('div');c.className='ai-card';
    c.innerHTML=`<h4>✅ Добавил ${obj.items.length} ${obj.items.length===1?'дело':'дел'}!</h4>`+obj.items.map(it=>`<div class="row"><span>${modLabel[it.module]||'📋'} ${esc(it.title)}</span><span style="color:var(--muted)">${it.date?fmtDate(it.date):''}</span></div>`).join('');

    let items=obj.items;
    if(!items)items=[{amount:obj.amount,category:obj.category,desc:obj.desc}];
    saveExpenses(items,obj.date);return;
  }

  if(obj.type==='income'){saveIncome(obj);return;}

  if(obj.type==='new_cat'&&obj.name){
    const id=createTaskCat(obj.name,obj.emoji||'⭐');

    c.innerHTML=`<h4>🗂 Категория дел создана!</h4><div class="row"><span style="font-size:1.3rem">${obj.emoji||'⭐'} <b>${esc(obj.name)}</b></span></div><div class="row" style="color:var(--muted)">Теперь она есть в меню внизу 👇</div>`;
    chat.appendChild(c);chat.scrollTop=chat.scrollHeight;confetti();toast('Категория создана ✅');
    return;
  }

  if(obj.type==='new_expcat'&&obj.name){
    const ok=createExpCat(obj.name,obj.emoji||'📦');
    const c=document.createElement('div');c.className='ai-card';
    if(ok)c.innerHTML=`<h4>💰 Категория трат создана!</h4><div class="row"><span style="font-size:1.3rem">${obj.emoji||'📦'} <b>${esc(obj.name)}</b></span></div><div class="row" style="color:var(--muted)">Теперь можно записывать в неё траты 🎉</div>`;
    else c.innerHTML=`<h4>ℹ️ Категория уже есть</h4><div class="row">${obj.emoji||'📦'} ${esc(obj.name)} — она уже в списке.</div>`;
    chat.appendChild(c);chat.scrollTop=chat.scrollHeight;if(ok){confetti();toast('Категория создана ✅');}
    return;
  }

  if(obj.type==='suggest_cat'&&obj.name){
    const emoji=obj.emoji||'📦';
    const p=obj.pending||{};
    const c=document.createElement('div');c.className='ai-card';c.style.borderLeftColor='var(--warn)';
    c.innerHTML=`<h4>🤔 Новая категория?</h4>
            <div class="row">Категории <b>${emoji} ${esc(obj.name)}</b> пока нет. Создать её и записать сюда трату?</div>
      ${p.amount?`<div class="row" style="color:var(--muted)">💸 ${fmtMoney(p.amount)}₽${p.desc?' — '+esc(p.desc):''}</div>`:''}
      <div class="ai-actions">
        <button class="yes" onclick='confirmSuggestCat(${JSON.stringify(obj.name)},${JSON.stringify(emoji)},${JSON.stringify(p)},this)'>✅ Создать</button>
        <button class="no" onclick='declineSuggestCat(${JSON.stringify(p)},this)'>❌ В «Прочее»</button>
      </div>`;
    chat.appendChild(c);chat.scrollTop=chat.scrollHeight;
    return;
  }

  if(obj.type==='stats'){
    const s=getExpenseStats();
    const c=document.createElement('div');c.className='ai-card';c.style.borderLeftColor='var(--brand)';
    c.innerHTML=`<h4>📊 Финансы за ${monthNames[new Date().getMonth()]}</h4>
      <div class="row">📈 Доходы: <b style="color:var(--ok)">+${fmtMoney(s.income)}₽</b></div>
      <div class="row">📉 Расходы: <b style="color:var(--bad)">−${fmtMoney(s.total)}₽</b></div>
      <div class="row" style="margin:8px 0;padding:8px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)">💰 Баланс: <b style="color:${s.balance>=0?'var(--ok)':'var(--bad)'}">${s.balance>=0?'+':''}${fmtMoney(s.balance)}₽</b></div>
      ${s.byCat.map(x=>{const st=catStyleOf(x.name);return `<div class="row">${st.i} ${esc(x.name)}: <b>${fmtMoney(x.sum)}₽</b></div>`;}).join('')||'<div class="row">Трат пока нет</div>'}`;
    chat.appendChild(c);chat.scrollTop=chat.scrollHeight;return;
  }

  if(obj.type==='mixed'){
    if(obj.tasks?.length)handleAI({type:'tasks',items:obj.tasks});
    if(obj.expenses?.length)saveExpenses(obj.expenses);
    if(obj.incomes?.length)obj.incomes.forEach(inc=>saveIncome(inc));
    return;
  }
  aiMsg('ai','Не совсем понял 🤔 Попробуй иначе.');
}

function declineSuggestCat(p,btn){

function saveExpenses(items,date){

  save(d);

  const valid=items.filter(it=>Number(it.amount)>0);

  const c=document.createElement('div');c.className='ai-card';
  c.innerHTML=`<h4>💰 Записал ${valid.length} ${valid.length===1?'трату':'траты'}!</h4>`+valid.map(it=>{const st=catStyleOf(it.category||'Прочее');return `<div class="row"><span>${st.i} <b>${fmtMoney(it.amount)}₽</b> — ${esc(it.category||'Прочее')}${it.desc?` <span style="color:var(--muted)">(${esc(it.desc)})</span>`:''}</span></div>`;}).join('')+`<div class="row" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)">📊 <b>Расходы за ${monthNames[new Date().getMonth()]}: ${fmtMoney(s.total)}₽</b></div>`;

/* ===== ГОЛОСОВОЙ ВВОД ЧЕРЕЗ WHISPER (работает на iPhone!) ===== */
let mediaRecorder=null, audioChunks=[], recording=false, recStream=null, micTimer=null;

async function toggleMic(){
  if(recording){ stopRec(); return; }

  const API_KEY=ensureApiKey();
  if(!API_KEY){ toast('🔑 Сначала добавь ключ Groq (напиши что-нибудь ИИ)'); return; }

  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('Микрофон не поддерживается 😔'); return;
  }

  try{
    recStream=await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(err){
    toast('Нет доступа к микрофону 🎤'); return;
  }

  // выбираем формат, который поддерживает устройство (важно для iOS)
  let mime='';
  const types=['audio/mp4','audio/webm','audio/aac','audio/ogg'];
  for(const t of types){ if(MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(t)){mime=t;break;} }

  try{
    mediaRecorder=mime?new MediaRecorder(recStream,{mimeType:mime}):new MediaRecorder(recStream);
  }catch(e){
    mediaRecorder=new MediaRecorder(recStream); mime='';
  }

  audioChunks=[];
  mediaRecorder.ondataavailable=e=>{ if(e.data&&e.data.size>0)audioChunks.push(e.data); };
  mediaRecorder.onstop=async()=>{
    document.getElementById('mic').classList.remove('rec');
    if(recStream){recStream.getTracks().forEach(t=>t.stop());recStream=null;}
    if(micTimer){clearTimeout(micTimer);micTimer=null;}
    const realType=mediaRecorder.mimeType||mime||'audio/webm';
    const blob=new Blob(audioChunks,{type:realType});
    if(blob.size<1000){ toast('Слишком тихо/коротко 🤔 Попробуй ещё раз'); return; }>
    await sendToWhisper(blob);
  };

  mediaRecorder.start(1000); // ⬅️ КЛЮЧЕВОЕ: сбрасываем данные каждую секунду
  recording=true;
  document.getElementById('mic').classList.add('rec');
  toast('🎤 Говори... нажми ещё раз, чтобы остановить');

  // защита: автостоп через 60 секунд
  micTimer=setTimeout(()=>{ if(recording){ toast('⏱ Записал 60 сек'); stopRec(); } },60000);
}

function stopRec(){
  recording=false;
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){
    try{mediaRecorder.stop();}catch(e){}
  }
}

async function sendToWhisper(blob){
  const API_KEY=ensureApiKey();
  if(!API_KEY)return;

  const inp=document.getElementById('ai-input');
  const prevPlaceholder=inp.placeholder;
  inp.placeholder='🎧 Распознаю речь...';
  aiTyping(true);

  const ext=(blob.type.includes('mp4')||blob.type.includes('aac'))?'mp4':
            blob.type.includes('ogg')?'ogg':'webm';
  const fd=new FormData();
  fd.append('file',blob,'audio.'+ext);
  fd.append('model','whisper-large-v3-turbo');
  fd.append('language','ru');
  fd.append('response_format','json');

  try{
    const res=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+API_KEY},
      body:fd
    });
    const data=await res.json();
    aiTyping(false);
    inp.placeholder=prevPlaceholder;

    if(data.error){
      const msg=data.error.message||'Ошибка распознавания';
      if(/api key|invalid|unauthorized|401/i.test(msg)){
        resetApiKey();
        toast('🔑 Ключ недействителен');
      }else toast('⚠️ '+msg);
      return;
    }

    const text=(data.text||'').trim();
    if(text){
      inp.value=text;
      setTimeout(aiSend,200); // сразу отправляем ИИ
    }else{
      toast('Не расслышал 🤔 Попробуй ещё раз');
    }
  }catch(err){
    aiTyping(false);
    inp.placeholder=prevPlaceholder;
    toast('⚠️ Ошибка сети при распознавании');
  }
}

function confetti(){
  const colors=['#6c5ce7','#a29bfe','#00b894','#fdcb6e','#e17055','#0984e3'];
  for(let i=0;i<24;i++){>
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.top='-20px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(c);
    const dur=1000+Math.random()*800,x=(Math.random()-0.5)*200;
    c.animate([{transform:'translate(0,0) rotate(0)',opacity:1},{transform:`translate(${x}px,${window.innerHeight+40}px) rotate(${Math.random()*720}deg)`,opacity:0}],{duration:dur,easing:'cubic-bezier(.5,0,.7,1)'});
    setTimeout(()=>c.remove(),dur);
  }
}

/* ===== СЕРИЯ ДНЕЙ (STREAK) ===== */
function getStreak(){const d=load();return d.streak||{count:0,last:''};}
function updateStreak(){
  const d=load();const s=d.streak||{count:0,last:''};
  const tk=todayKey();
  if(s.last===tk)return;
  const y=new Date();y.setDate(y.getDate()-1);
  const yk=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
  s.count=(s.last===yk)?s.count+1:1;
  s.last=tk;d.streak=s;save(d);renderStreak();
  if(s.count>1)toast('🔥 Серия: '+s.count+' дн. подряд!');
}
function renderStreak(){
  const s=getStreak();const box=document.getElementById('streakBox');
  if(!box)return;
  if(s.count>0){box.style.display='inline-flex';box.textContent='🔥 '+s.count+(s.count===1?' день':' дн. подряд');}
  else box.style.display='none';
}

/* ===== ТЕМА И ЦВЕТ ===== */
const ACCENTS=[
  {b:'#6c5ce7',b2:'#a29bfe'},{b:'#00b894',b2:'#55efc4'},{b:'#0984e3',b2:'#74b9ff'},
  {b:'#e17055',b2:'#fab1a0'},{b:'#e84393',b2:'#fd79a8'},{b:'#fdcb6e',b2:'#ffeaa7'},
  {b:'#00cec9',b2:'#81ecec'},{b:'#d63031',b2:'#ff7675'}
];
function applyAccent(idx){
  const a=ACCENTS[idx]||ACCENTS[0];
  document.documentElement.style.setProperty('--brand',a.b);
  document.documentElement.style.setProperty('--brand2',a.b2);
  document.getElementById('meta-theme').setAttribute('content',a.b);
  const d=load();d.accent=idx;save(d);
}
function renderColorPick(){
  const cur=load().accent||0;
  document.getElementById('color-pick').innerHTML=ACCENTS.map((a,i)=>`<span class="${i===cur?'sel':''}" style="background:linear-gradient(135deg,${a.b},${a.b2})" onclick="pickAccent(${i})"></span>`).join('');
}
function pickAccent(i){applyAccent(i);renderColorPick();toast('Цвет обновлён 🎨');}

function getThemeMode(){return load().themeMode||'auto';}
function setThemeMode(mode){const d=load();d.themeMode=mode;save(d);applyTheme();updateThemeButtons();}
function applyTheme(){
  const mode=getThemeMode();
  let dark;
  if(mode==='dark')dark=true;
  else if(mode==='light')dark=false;
  else dark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  document.body.classList.toggle('dark',dark);
}
function updateThemeButtons(){
  const mode=getThemeMode();
  ['auto','light','dark'].forEach(m=>{const b=document.getElementById('th-'+m);if(b)b.classList.toggle('on',m===mode);});
}
function toggleTheme(){
  const cur=document.body.classList.contains('dark');
  setThemeMode(cur?'light':'dark');
  toast(cur?'☀️ Светлая тема':'🌙 Тёмная тема');
}

/* ===== ЭКСПОРТ / ИМПОРТ ===== */
function exportData(){
  const data=localStorage.getItem(KEY)||'{}';
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='planner-backup-'+todayKey()+'.json';a.click();
  URL.revokeObjectURL(url);toast('Копия скачана 📥');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const obj=JSON.parse(ev.target.result);
      if(typeof obj!=='object')throw new Error('bad');
      if(!confirm('Заменить все текущие данные загруженной копией?'))return;
      localStorage.setItem(KEY,JSON.stringify(obj));
      toast('Данные загружены ✅');
      setTimeout(()=>location.reload(),600);
    }catch(err){toast('Файл повреждён 😔');}
  };
  reader.readAsText(file);
  e.target.value='';
}

/* ===== НАПОМИНАНИЯ ===== */
function requestNotify(){
  if(!('Notification'in window)){toast('Уведомления не поддерживаются 😔');return;}
  if(Notification.permission==='granted'){scheduleNotify();toast('🔔 Напоминания включены');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){scheduleNotify();toast('🔔 Напоминания включены на 9:00');}
    else toast('Разрешение не выдано 😔');
  });
}
function scheduleNotify(){
  const d=load();d.notify=true;save(d);
  checkMorningNotify();
}
function checkMorningNotify(){
  const d=load();if(!d.notify)return;
  if(Notification.permission!=='granted')return;
  const now=new Date();
  const tk=todayKey();
  if(d.lastNotify===tk)return;
  if(now.getHours()>=9){
    const tasks=getTasks().filter(t=>!t.done&&t.date===tk);
    const s=getExpenseStats();
    let body='';
    if(tasks.length)body='📋 Дел на сегодня: '+tasks.length+'. ';
    else body='✅ На сегодня дел нет. ';
    body+='💰 Баланс: '+(s.balance>=0?'+':'')+fmtMoney(s.balance)+'₽';
    new Notification('☀️ Доброе утро!',{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><text y="50" font-size="50">📋</text></svg>'});
    d.lastNotify=tk;save(d);
  }
}
